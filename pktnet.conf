# PKTNET bot configuration (example)
# Copy to /etc/pktnet/pktnet.conf and fill in your passcode.
# Keep the real file out of your git repository (it holds the passcode).

[aprsis]
# A tier-2 rotate works; for Brazil you may prefer a regional pool.
server = rotate.aprs2.net
port = 14580

# Verified login identity for the connection. The passcode is derived from
# the BASE callsign (PP5PK), so it is the same with or without the SSID.
login_call = PP5PK-3
passcode = 24034

# The special net callsign users address their messages to.
net_call = PKTNET

[net]
# When true, check-ins only count while an event window is active
# (register windows with: pktnet_bot.py addevent ...).
# When false, the bot auto-creates a daily ad-hoc event and always logs.
require_active_event = true

# Reply templates. Placeholders: {time} = HHMM UTC, {call}, {event}.
# Keep each under 67 characters; PP5PK is included for station ID.
confirm_text = Check-in OK {time}z. 73 de PP5PK
dup_text     = Already registered {time}z. 73 de PP5PK
closed_text  = PKTNET out of hours! 73 de PP5PK

[messaging]
max_retries = 3
retry_interval = 30
keepalive_interval = 20
rx_timeout = 90

[db]
path = /var/lib/pktnet/pktnet.db
